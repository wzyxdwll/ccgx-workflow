name: Update Contributors

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  contributors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: akhilmhdh/contributors-readme-action@v2.3.11
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          readme_path: "README.md,README.zh-CN.md"
          columns_per_row: 7
          image_size: 100
          collaborators: all
